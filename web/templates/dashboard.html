<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Trading</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#12121a;--border:#1a1a24;--text:#e4e4e7;--muted:#52525b;--green:#22c55e;--red:#ef4444;--paper:#818cf8;--live:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.logo{font-size:15px;font-weight:700}.logo span{color:var(--paper)}.header-right{display:flex;align-items:center;gap:12px}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.btn:hover{background:var(--border)}
.btn-paper{background:rgba(129,140,248,0.1);border-color:var(--paper);color:var(--paper)}
.btn-live{background:rgba(245,158,11,0.1);border-color:var(--live);color:var(--live)}
.main{padding:20px 24px;display:grid;grid-template-columns:1fr 320px;gap:20px}
.section{margin-bottom:20px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.label-paper{color:var(--paper)}
.label-live{color:var(--live)}
.dot{width:8px;height:8px;border-radius:50%}
.dot-paper{background:var(--paper)}
.dot-live{background:var(--live);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#333}
.card.active{border-color:var(--card-color,var(--paper))}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-name{font-size:12px;font-weight:600}
.card-mode{font-size:10px;padding:2px 6px;border-radius:4px}
.mode-paper{background:rgba(129,140,248,0.15);color:var(--paper)}
.mode-live{background:rgba(245,158,11,0.15);color:var(--live)}
.card-pnl{font-size:22px;font-weight:700;font-family:monospace;margin-bottom:8px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}
.card-meta{display:flex;gap:16px;font-size:11px;color:var(--muted)}
.card-meta span{color:var(--text)}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.chart-wrap{height:200px}
.pos-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.pos-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.pos-dot{width:6px;height:6px;border-radius:50%}
.pos-name{font-weight:600;font-size:12px}
.pos-balance{margin-left:auto;font-family:monospace;font-size:12px}
.pos-table{width:100%;border-collapse:collapse}
.pos-table th{padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border)}
.pos-table td{padding:8px 12px;font-size:11px;border-bottom:1px solid var(--border)}
.pos-table tr:last-child td{border-bottom:none}
.pos-empty{padding:24px;text-align:center;color:var(--muted)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>

<header class="header">
  <div class="logo">PM <span>Trading</span></div>
  <div class="header-right">
    <span id="clock" style="font-family:monospace;color:var(--muted)">--:--:--</span>
    <button class="btn" onclick="resetPaper()" style="background:rgba(129,140,248,0.1);border-color:var(--paper);color:var(--paper)">Reset Paper</button>
  </div>
</header>

<div class="main">
  <div class="left">
    <div class="section" id="paper-section">
      <div class="section-header">
        <div class="dot dot-paper"></div>
        <span class="section-label label-paper">Paper Trading</span>
      </div>
      <div class="cards" id="paper-cards"></div>
    </div>
    <div class="section" id="live-section">
      <div class="section-header">
        <div class="dot dot-live"></div>
        <span class="section-label label-live">Live Trading</span>
      </div>
      <div class="cards" id="live-cards"></div>
    </div>
  </div>
  <div class="right">
    <div class="chart-card">
      <div class="card-title">P&L %</div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>
    <div class="pos-card" style="margin-top:16px">
      <div class="pos-header">
        <div class="pos-dot" id="pos-dot" style="background:var(--paper)"></div>
        <div class="pos-name" id="pos-name">—</div>
        <div class="pos-balance" id="pos-balance">—</div>
      </div>
      <table class="pos-table">
        <thead><tr><th>Mercado</th><th>Dir</th><th>P&L</th></tr></thead>
        <tbody id="pos-tbody"><tr><td colspan="3" class="pos-empty">Sin posiciones</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let state=null,selected=null,chart=null;

function tick(){
  $('clock').textContent=new Date().toLocaleTimeString('es-ES',{hour12:false});
}
setInterval(tick,1000);tick();

function fmt$(v){return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function pct(v){return(v>=0?'+':'')+v.toFixed(2)+'%'}
function cls(v){return v>0?'pos':v<0?'neg':'neu'}
function trunc(s,n){return s.length>n?s.slice(0,n-1)+'…':s}

function toast(m){
  $('toast').textContent=m;
  $('toast').classList.add('show');
  setTimeout(()=>$('toast').classList.remove('show'),3000);
}

function renderCards(bots,container,mode){
  const filtered=bots.filter(b=>mode==='paper'?b.name.includes('PAPER'):b.name.includes('LIVE'));
  if(!filtered.length){container.innerHTML='<div style="color:var(--muted);font-size:12px">No hay bots</div>';return}
  container.innerHTML=filtered.map(b=>{
    const color=b.color||'var(--paper)';
    const isActive=selected===b.name;
    return`<div class="card ${isActive?'active':''}" style="--card-color:${color}" onclick="selectBot('${b.name}')">
      <div class="card-header">
        <div class="card-name">${b.name}</div>
        <div class="card-mode ${mode==='paper'?'mode-paper':'mode-live'}">${mode==='paper'?'PAPER':'LIVE'}</div>
      </div>
      <div class="card-pnl ${cls(b.pnl_pct)}">${pct(b.pnl_pct)}</div>
      <div class="card-meta">pos:<span>${b.open_count}</span> trades:<span>${b.trades}</span> win:<span>${b.win_rate}%</span></div>
    </div>`;
  }).join('');
}

function render(){
  if(!state)return;
  renderCards(state.bots,$('paper-cards'),'paper');
  renderCards(state.bots,$('live-cards'),'live');
  if(!selected&&state.bots.length){
    selected=[...state.bots].sort((a,b)=>b.pnl-a.pnl)[0].name;
  }
  const bot=state.bots.find(b=>b.name===selected);
  if(bot){
    $('pos-dot').style.background=bot.color||'var(--paper)';
    $('pos-name').textContent=bot.name;
    $('pos-balance').textContent=fmt$(bot.total_value);
    const tb=$('pos-tbody');
    if(!bot.positions.length){
      tb.innerHTML='<tr><td colspan="3" class="pos-empty">Sin posiciones</td></tr>';
    } else {
      tb.innerHTML=bot.positions.map(p=>{
        const dir=p.outcome==='YES'?'<span style="color:#06b6d4">UP</span>':'<span style="color:#a855f7">DOWN</span>';
        return`<tr><td>${trunc(p.question,20)}</td><td>${dir}</td><td class="${cls(p.pnl)}">${p.pnl>=0?'+':''}${fmt$(p.pnl)}</td></tr>`;
      }).join('');
    }
  }
}

function selectBot(n){
  selected=n;
  render();
  updateChart();
}

function initChart(){
  const ctx=$('chart').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',
    data:{datasets:[]},
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false}},
      scales:{
        x:{type:'time',time:{unit:'minute',displayFormats:{minute:'HH:mm'}},
        y:{ticks:{callback:v=>pct(v)}}
      }
    }
  });
}

function updateChart(){
  if(!chart||!state)return;
  fetch('/api/history').then(r=>r.json()).then(h=>{
    Object.entries(h).forEach(([name,pts])=>{
      const data=pts.map(p=>({x:p.ts,y:p.pnl_pct}));
      const color=state.bots.find(b=>b.name===name)?.color||'#888';
      const i=chart.data.datasets.findIndex(d=>d.label===name);
      if(i===-1){
        chart.data.datasets.push({label:name,data,borderColor:color,borderWidth:1.5,pointRadius:0,tension:0.3});
      } else {
        chart.data.datasets[i].data=data;
      }
    });
    chart.update('none');
  });
}

async function resetPaper(){
  if(!confirm('Resetear solo bots PAPER?'))return;
  await fetch('/api/reset-paper',{method:'POST'});
  toast('Paper traders reseteados');
  selected=null;
  chart.data.datasets=[];
  chart.update();
  fetchState();
}

function fetchState(){
  fetch('/api/state').then(r=>r.json()).then(s=>{
    state=s;
    render();
  });
}

initChart();
fetchState();
fetch('/api/history').then(r=>r.json()).then(h=>{updateChart();});
setInterval(fetchState,3000);
setInterval(updateChart,5000);
</script>
</body>
</html>
